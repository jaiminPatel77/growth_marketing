<div class="h-full rounded-2xl p-8 transition-all duration-300 transform hover:-translate-y-2 hover:shadow-xl group"
     [ngClass]="isDark ? 'bg-dark-800 border border-dark-700 text-white hover:bg-dark-700/80 hover:border-primary-500/50' : 'bg-white border border-gray-100 shadow-sm hover:border-primary-200'">
  
  <div class="w-14 h-14 rounded-xl flex items-center justify-center mb-6 transition-colors"
       [ngClass]="isDark ? 'bg-dark-900 border border-dark-700 text-primary-400 group-hover:bg-primary-500/20' : 'bg-primary-50 text-primary-600 group-hover:bg-primary-100'">
    <!-- Display SVG icon from string or use ng-content if not provided -->
    <div *ngIf="icon" [innerHTML]="icon" class="w-7 h-7"></div>
    <ng-content select="[icon]"></ng-content>
  </div>

  <h3 class="text-xl font-heading font-semibold mb-3" [class.text-white]="isDark" [class.text-gray-900]="!isDark">
    {{ title }}
  </h3>
  
  <p class="text-sm mb-6 leading-relaxed" [class.text-gray-400]="isDark" [class.text-gray-600]="!isDark">
    {{ description }}
  </p>

  <!-- Content slot for arbitrary items like benefits list -->
  <ng-content></ng-content>

</div>
