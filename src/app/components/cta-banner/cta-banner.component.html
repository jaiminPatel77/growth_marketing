<div class="relative overflow-hidden rounded-3xl bg-dark-900 border border-gray-800 p-10 md:p-16 text-center lg:text-left flex flex-col lg:flex-row items-center justify-between shadow-2xl group">
  
  <!-- Animated Gradient Background Effect -->
  <div class="absolute inset-0 bg-gradient-to-r from-primary-600/20 to-blue-600/20 opacity-0 group-hover:opacity-100 transition-opacity duration-700 pointer-events-none"></div>
  
  <!-- Content -->
  <div class="relative z-10 max-w-2xl mb-8 lg:mb-0">
    <h2 class="text-3xl md:text-4xl font-heading font-bold text-white mb-4">
      {{ title }}
    </h2>
    <p class="text-lg text-gray-400">
      {{ subtitle }}
    </p>
  </div>
  
  <!-- CTA Button -->
  <div class="relative z-10 flex-shrink-0">
    <a [routerLink]="buttonLink" class="inline-flex items-center justify-center px-8 py-4 text-base font-semibold text-white bg-primary-600 hover:bg-primary-500 transition-all duration-300 rounded-full shadow-lg hover:shadow-primary-500/30 transform hover:-translate-y-1">
      {{ buttonText }}
      <svg class="ml-2 -mr-1 w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
      </svg>
    </a>
  </div>
  
</div>
