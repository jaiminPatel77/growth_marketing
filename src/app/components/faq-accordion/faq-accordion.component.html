<div class="max-w-3xl mx-auto space-y-4">
  <div *ngFor="let faq of faqs; let i = index" 
       class="glass rounded-2xl overflow-hidden transition-all duration-300"
       [ngClass]="faq.isOpen ? 'border-primary-500/50 shadow-md' : 'border-gray-100 dark:border-gray-800'">
    
    <button (click)="toggleFaq(i)" class="w-full px-6 py-5 text-left flex justify-between items-center focus:outline-none">
      <span class="text-lg font-medium text-gray-900 dark:text-gray-100 pr-8">{{ faq.question }}</span>
      <span class="flex-shrink-0 ml-2">
        <!-- Icon logic based on state -->
        <svg class="w-5 h-5 text-gray-500 dark:text-gray-400 transform transition-transform duration-300" 
             [class.rotate-180]="faq.isOpen" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </span>
    </button>
    
    <!-- Answer Panel -->
    <div class="overflow-hidden transition-all duration-300 ease-in-out"
         [style.maxHeight]="faq.isOpen ? '300px' : '0'"
         [style.opacity]="faq.isOpen ? '1' : '0'">
      <div class="px-6 pb-6 text-gray-600 dark:text-gray-400 leading-relaxed">
        {{ faq.answer }}
      </div>
    </div>
    
  </div>
</div>
