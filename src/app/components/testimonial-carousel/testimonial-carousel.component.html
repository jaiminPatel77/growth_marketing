<div class="relative py-12">
  
  <!-- Carousel Track (Simplified for single slide view) -->
  <div class="overflow-hidden relative">
    <div class="flex transition-transform duration-500 ease-in-out"
         [style.transform]="'translateX(-' + (currentIndex * 100) + '%)'">
         
      <div *ngFor="let t of testimonials" class="w-full flex-shrink-0 px-4">
        <div class="max-w-4xl mx-auto glass p-8 md:p-12 rounded-3xl relative">
          
          <!-- Quote Icon -->
          <div class="absolute top-6 left-8 text-primary-500/20">
            <svg class="w-16 h-16" fill="currentColor" viewBox="0 0 32 32">
              <path d="M9.352 4C4.456 7.456 1 13.12 1 19.36c0 5.088 3.072 8.064 6.624 8.064 3.36 0 5.856-2.688 5.856-5.856 0-3.168-2.208-5.472-5.088-5.472-.576 0-1.344.096-1.536.192.48-3.264 3.552-7.104 6.624-9.024L9.352 4zm16.512 0c-4.8 3.456-8.256 9.12-8.256 15.36 0 5.088 3.072 8.064 6.624 8.064 3.264 0 5.856-2.688 5.856-5.856 0-3.168-2.304-5.472-5.184-5.472-.576 0-1.248.096-1.44.192.48-3.264 3.456-7.104 6.528-9.024L25.864 4z"/>
            </svg>
          </div>

          <!-- Content -->
          <div class="relative z-10 pt-4 px-2 md:px-8">
            <p class="text-xl md:text-2xl lg:text-3xl font-medium text-gray-800 dark:text-gray-100 leading-snug mb-10">
              "{{ t.content }}"
            </p>
            
            <div class="flex items-center">
              <img *ngIf="t.avatarUrl" [src]="t.avatarUrl" [alt]="t.author" class="w-14 h-14 rounded-full border-2 border-primary-100 dark:border-primary-900 shadow-md">
              <div class="ml-4">
                <div class="text-base font-semibold text-gray-900 dark:text-white">{{ t.author }}</div>
                <div class="text-sm text-primary-600 dark:text-primary-400 font-medium">{{ t.role }}, {{ t.company }}</div>
              </div>
            </div>
          </div>
          
        </div>
      </div>
      
    </div>
  </div>

  <!-- Navigation Buttons & Dots -->
  <div class="flex justify-center items-center space-x-6 mt-10">
    <!-- Prev -->
    <button (click)="prev()" class="p-2 rounded-full border border-gray-200 dark:border-gray-700 text-gray-400 hover:text-primary-600 dark:hover:text-primary-400 hover:border-primary-500 transition-colors focus:outline-none focus:ring-2 focus:ring-primary-500">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </button>
    
    <!-- Dots -->
    <div class="flex space-x-2">
      <button *ngFor="let t of testimonials; let i = index" 
              (click)="setIndex(i)"
              class="w-2.5 h-2.5 rounded-full transition-all duration-300 focus:outline-none"
              [ngClass]="i === currentIndex ? 'bg-primary-600 w-6' : 'bg-gray-300 dark:bg-gray-600 hover:bg-primary-400'"></button>
    </div>
    
    <!-- Next -->
    <button (click)="next()" class="p-2 rounded-full border border-gray-200 dark:border-gray-700 text-gray-400 hover:text-primary-600 dark:hover:text-primary-400 hover:border-primary-500 transition-colors focus:outline-none focus:ring-2 focus:ring-primary-500">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
      </svg>
    </button>
  </div>

</div>
