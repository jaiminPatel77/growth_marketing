<!-- Portfolio Section -->
<section class="relative pt-24 pb-20 bg-dark-900 overflow-hidden">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center relative z-10">
    <h1 class="text-4xl md:text-6xl font-heading font-extrabold text-white mb-6 animate-slide-up">
      Our <span class="text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-orange-400">Portfolio</span>
    </h1>
    <p class="text-lg md:text-xl text-gray-400 max-w-2xl mx-auto mb-12 animate-slide-up" style="animation-delay: 0.1s;">
      Discover our complete collection of creative social media marketing assets. Optimized for performance and high engagement.
    </p>

    <!-- Empty State -->
    <div *ngIf="!isLoading && portfolioItems.length === 0" class="py-20 animate-fade-in">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-dark-800 text-gray-500 mb-6">
        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
      </div>
      <h3 class="text-xl font-bold text-white mb-2">Portfolio images will appear here soon.</h3>
      <p class="text-gray-400">We're currently updating our latest projects. Check back shortly!</p>
    </div>

    <!-- Skeleton Loader -->
    <div *ngIf="isLoading" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 animate-fade-in">
      <div *ngFor="let i of [1,2,3,4,5,6,7,8]" class="aspect-square rounded-2xl bg-dark-800 animate-pulse border border-gray-800"></div>
    </div>

    <!-- Portfolio Grid -->
    <div *ngIf="!isLoading && portfolioItems.length > 0" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 animate-fade-in" style="animation-delay: 0.2s;">
      <div 
        *ngFor="let item of paginatedItems; let i = index" 
        (click)="openLightbox(item.image)"
        class="group relative aspect-square rounded-2xl overflow-hidden cursor-pointer bg-dark-800 border border-gray-800 transition-all hover:border-primary-500/50 hover:shadow-xl hover:shadow-primary-500/10">
        
        <!-- Image with Zoom Effect -->
        <img 
          [src]="item.image" 
          [alt]="item.title"
          loading="lazy"
          class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700">
        
        <!-- Hover Overlay -->
        <div class="absolute inset-0 bg-gradient-to-t from-dark-900/90 via-dark-900/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-6 text-left">
          <h3 class="text-white font-bold text-lg leading-tight">{{ item.title }}</h3>
          <div class="mt-4 flex items-center text-primary-400 text-sm font-medium gap-2">
            View Details
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Pagination Controls -->
    <div *ngIf="!isLoading && totalPages > 1" class="mt-16 flex flex-wrap justify-center items-center gap-2 animate-fade-in">
      <!-- Previous -->
      <button 
        (click)="setPage(currentPage - 1)"
        [disabled]="currentPage === 1"
        class="px-4 py-2 rounded-lg border border-gray-700 bg-dark-800 text-gray-400 hover:border-primary-500 hover:text-white transition-all disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        Previous
      </button>

      <!-- Page Numbers -->
      <button 
        *ngFor="let page of pages"
        (click)="setPage(page)"
        [class]="currentPage === page 
          ? 'bg-primary-600 text-white border-primary-600' 
          : 'bg-dark-800 text-gray-400 border-gray-700 hover:border-primary-500 hover:text-white'"
        class="w-10 h-10 rounded-lg border text-sm font-bold transition-all">
        {{ page }}
      </button>

      <!-- Next -->
      <button 
        (click)="setPage(currentPage + 1)"
        [disabled]="currentPage === totalPages"
        class="px-4 py-2 rounded-lg border border-gray-700 bg-dark-800 text-gray-400 hover:border-primary-500 hover:text-white transition-all disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-2">
        Next
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
      </button>
    </div>
  </div>
</section>

<!-- Lightbox Modal -->
<div 
  *ngIf="selectedImage" 
  class="fixed inset-0 z-[100] flex items-center justify-center bg-dark-900/95 p-4 md:p-10 animate-fade-in"
  (click)="closeLightbox()">
  
  <button 
    (click)="closeLightbox()" 
    class="absolute top-6 right-6 text-white hover:text-primary-400 p-2 bg-dark-800 rounded-full transition-colors z-[110]">
    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
  </button>

  <img 
    [src]="selectedImage" 
    [alt]="'Project Preview'"
    class="max-w-full max-h-full object-contain rounded-lg shadow-2xl animate-zoom-in"
    (click)="$event.stopPropagation()">
</div>
