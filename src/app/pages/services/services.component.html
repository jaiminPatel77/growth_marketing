<!-- Hero Section -->
<section class="relative pt-20 pb-16 bg-dark-900 border-b border-gray-800 text-center">
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
    <h1 class="text-4xl md:text-5xl lg:text-6xl font-heading font-extrabold text-white mb-6 animate-slide-up">
      Our <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary-400 to-blue-400">Services</span>
    </h1>
    <p class="text-lg md:text-xl text-gray-400 animate-slide-up" style="animation-delay: 0.1s;">
      We provide a full-stack growth engine to help your business scale predictably, leveraging the latest in AI, automation, and data science.
    </p>
  </div>
</section>

<!-- Services Detailed List -->
<section class="py-20 bg-gray-50 dark:bg-dark-800">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    
    <div class="space-y-16">
      
      <div *ngFor="let service of services; let i = index" 
           class="glass rounded-3xl p-8 lg:p-12 transition-all duration-500 hover:shadow-xl group flex flex-col lg:flex-row gap-10"
           [ngClass]="{'lg:flex-row-reverse': i % 2 !== 0}">
        
        <!-- Icon & Text -->
        <div class="lg:w-1/2 flex flex-col justify-center">
          <div class="w-16 h-16 rounded-2xl bg-primary-100 dark:bg-dark-800 border-2 border-primary-200 dark:border-primary-900/50 flex flex-shrink-0 items-center justify-center text-primary-600 dark:text-primary-400 mb-6 group-hover:bg-primary-500 group-hover:text-white transition-all duration-300 shadow-sm" [innerHTML]="service.icon">
          </div>
          
          <h2 class="text-3xl font-heading font-bold text-gray-900 dark:text-white mb-4">{{ service.title }}</h2>
          <p class="text-lg text-gray-600 dark:text-gray-400 mb-8 leading-relaxed">
            {{ service.description }}
          </p>
          
          <div>
            <a routerLink="/contact" class="inline-flex items-center text-primary-600 dark:text-primary-400 font-semibold hover:text-primary-700 dark:hover:text-primary-300 transition-colors">
              Discuss this service
              <svg class="ml-2 w-5 h-5 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
            </a>
          </div>
        </div>
        
        <!-- Benefits List inside App-Card for styling -->
        <div class="lg:w-1/2 flex items-center">
           <div class="w-full bg-white dark:bg-dark-900 rounded-2xl p-8 border border-gray-100 dark:border-gray-800 shadow-sm group-hover:border-primary-500/50 transition-colors">
             <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-6 border-b border-gray-100 dark:border-gray-800 pb-4">Key Deliverables</h3>
             <ul class="space-y-4">
               <li *ngFor="let benefit of service.benefits" class="flex items-start">
                 <div class="flex-shrink-0 h-6 w-6 flex items-center justify-center rounded-full bg-primary-100 dark:bg-primary-900/30 text-primary-600 dark:text-primary-400 mt-0.5">
                   <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
                 </div>
                 <span class="ml-3 text-base text-gray-600 dark:text-gray-300">{{ benefit }}</span>
               </li>
             </ul>
           </div>
        </div>

      </div>

    </div>
    
  </div>
</section>

<!-- CTA -->
<section class="py-24 bg-white dark:bg-dark-900 flex justify-center">
  <div class="w-full max-w-5xl px-4 sm:px-6 lg:px-8">
    <app-cta-banner title="Not sure where to start?" subtitle="Let our experts run a comprehensive audit on your current stack and show you the gaps." buttonText="Request Audit"></app-cta-banner>
  </div>
</section>
